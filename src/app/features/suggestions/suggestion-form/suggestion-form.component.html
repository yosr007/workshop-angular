<h2 class="form-title">Ajouter une nouvelle suggestion</h2>

<form [formGroup]="suggestionForm" (ngSubmit)="submit()" class="suggestion-form">

  <!-- Titre -->
  <div class="form-group">
    <label for="title">Titre <span class="required">*</span></label>
    <input id="title" type="text" formControlName="title" class="form-control" />
    <div *ngIf="suggestionForm.get('title')?.invalid && suggestionForm.get('title')?.touched" class="error">
      Titre invalide : minimum 5 caractères, commence par une majuscule, lettres uniquement.
    </div>
  </div>

  <!-- Description -->
  <div class="form-group">
    <label for="description">Description <span class="required">*</span></label>
    <textarea id="description" formControlName="description" class="form-control"></textarea>
    <div *ngIf="suggestionForm.get('description')?.invalid && suggestionForm.get('description')?.touched" class="error">
      Description invalide : minimum 30 caractères.
    </div>
  </div>

  <!-- Catégorie -->
  <div class="form-group">
    <label for="category">Catégorie <span class="required">*</span></label>
    <select id="category" formControlName="category" class="form-control">
      <option value="">Sélectionnez une catégorie</option>
      <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
    </select>
    <div *ngIf="suggestionForm.get('category')?.invalid && suggestionForm.get('category')?.touched" class="error">
      La catégorie est obligatoire.
    </div>
  </div>

  <!-- Date -->
  <div class="form-group">
    <label for="date">Date</label>
    <input id="date" type="text" formControlName="date" class="form-control" readonly />
  </div>

  <!-- Status -->
  <div class="form-group">
    <label for="status">Status</label>
    <input id="status" type="text" formControlName="status" class="form-control" readonly />
  </div>

  <!-- Buttons -->
  <div class="form-buttons">
    <button type="submit" [disabled]="suggestionForm.invalid" class="btn btn-submit">Soumettre</button>
    <button type="button" (click)="backToList()" class="btn btn-cancel">Annuler</button>
  </div>

</form>
